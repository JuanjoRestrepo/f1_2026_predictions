name: AI Race Summarizer (Automated)

on:
  schedule:
    # Run every Sunday at 20:00 UTC (Usually after European/American races end)
    - cron: '0 20 * * 0'
  workflow_dispatch:
    inputs:
      year:
        description: 'Season Year'
        required: true
        default: '2026'
      round:
        description: 'Round Number'
        required: true
        default: '4'
      event:
        description: 'Event Name'
        required: true
        default: 'Miami Grand Prix'

jobs:
  generate-summary:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to commit the report back to the repo
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync

      - name: Generate AI Race Summary
        env:
          # This secret must be added to GitHub Repository Secrets
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          YEAR="${{ github.event.inputs.year || '2026' }}"
          ROUND="${{ github.event.inputs.round || '4' }}"
          EVENT="${{ github.event.inputs.event || 'Miami Grand Prix' }}"
          
          echo "Generating summary for $EVENT ($YEAR) Round $ROUND..."
          
          # Run the summarizer and pipe output to a Markdown file
          mkdir -p reports/$YEAR/summaries
          uv run scripts/generate_ai_summary.py --year "$YEAR" --round "$ROUND" --event "$EVENT" > reports/$YEAR/summaries/report_round_${ROUND}.md
          
      - name: Commit and Push Report
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/
          # Only commit if there are changes
          git diff --quiet && git diff --staged --quiet || (git commit -m "docs: auto-generate AI race summary for Round ${{ github.event.inputs.round || '4' }}" && git push)
