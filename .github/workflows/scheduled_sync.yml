name: Scheduled Race Sync & Briefing

# Runs Friday (Pre-race simulation), Monday (Post-race audit), and Wednesday (Safety)
on:
  schedule:
    - cron: '0 18 * * 5'  # Friday 18:00 UTC (Pre-race simulation)
    - cron: '0 9 * * 1'   # Monday 09:00 UTC (Post-race audit)
    - cron: '0 9 * * 3'   # Wednesday 09:00 UTC (Safety net)
  workflow_dispatch:
    inputs:
      round:
        description: 'Force a specific round number'
        required: false
        type: string
      mode:
        description: 'Force mode (pre-race or post-race)'
        required: false
        default: 'post-race'
        type: choice
        options:
          - pre-race
          - post-race
      season:
        description: 'Season year (default: 2026)'
        required: false
        default: '2026'
        type: string

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.14'

jobs:
  detect-and-run:
    name: Detect Race & Run Pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Detect race (auto-mode)
        id: detect
        if: ${{ !inputs.round }}
        env:
          SEASON: ${{ inputs.season || '2026' }}
        run: |
          DOW=$(date +%u)
          if [ "$DOW" -eq 5 ]; then
            echo "Mode: Pre-Race (Friday Detection)"
            FUNC="detect_upcoming_race"
            echo "mode=pre-race" >> $GITHUB_OUTPUT
          else
            echo "Mode: Post-Race (Audit Detection)"
            FUNC="detect_last_race"
            echo "mode=post-race" >> $GITHUB_OUTPUT
          fi

          RESULT=$(uv run python -c "
          from f1_predictions.utils.race_detector import $FUNC
          result = $FUNC(int('$SEASON'))
          import json
          print(json.dumps(result) if result else '')
          ")
          
          if [ -z "$RESULT" ]; then
            echo "No relevant race detected. Exiting."
            echo "race_found=false" >> $GITHUB_OUTPUT
          else
            ROUND=$(echo $RESULT | uv run python -c "import sys, json; print(json.load(sys.stdin)['round'])")
            EVENT=$(echo $RESULT | uv run python -c "import sys, json; print(json.load(sys.stdin)['gp_name'])")
            echo "Race detected: $EVENT (Round $ROUND)"
            echo "race_found=true" >> $GITHUB_OUTPUT
            echo "round=$ROUND" >> $GITHUB_OUTPUT
            echo "event=$EVENT" >> $GITHUB_OUTPUT
          fi

      - name: Set round (manual override)
        id: set-round
        if: ${{ inputs.round }}
        run: |
          echo "race_found=true" >> $GITHUB_OUTPUT
          echo "round=${{ inputs.round }}" >> $GITHUB_OUTPUT

      - name: Resolve final round number
        id: resolve
        run: |
          AUTO_FOUND="${{ steps.detect.outputs.race_found }}"
          MANUAL_FOUND="${{ steps.set-round.outputs.race_found }}"
          if [ "$AUTO_FOUND" = "true" ]; then
            echo "race_found=true" >> $GITHUB_OUTPUT
            echo "round=${{ steps.detect.outputs.round }}" >> $GITHUB_OUTPUT
            echo "mode=${{ steps.detect.outputs.mode }}" >> $GITHUB_OUTPUT
            echo "event=${{ steps.detect.outputs.event }}" >> $GITHUB_OUTPUT
          elif [ "$MANUAL_FOUND" = "true" ]; then
            echo "race_found=true" >> $GITHUB_OUTPUT
            echo "round=${{ steps.set-round.outputs.round }}" >> $GITHUB_OUTPUT
            echo "mode=${{ inputs.mode || 'post-race' }}" >> $GITHUB_OUTPUT
            echo "event=Grand Prix" >> $GITHUB_OUTPUT
          else
            echo "race_found=false" >> $GITHUB_OUTPUT
          fi

      - name: Run ML simulation (Pre-Race only)
        if: steps.resolve.outputs.race_found == 'true' && steps.resolve.outputs.mode == 'pre-race'
        run: |
          uv run python scripts/simulate_race.py \
            --round ${{ steps.resolve.outputs.round }} \
            --event "${{ steps.resolve.outputs.event }}"

      - name: Run master pipeline
        if: steps.resolve.outputs.race_found == 'true'
        env:
          F1_GEMINI_API_KEY: ${{ secrets.F1_GEMINI_API_KEY }}
          F1_GEMINI_MODEL: gemini-3.1-pro-preview
          F1_GEMINI_FALLBACK_MODEL: gemini-3.5-flash
          F1_TARGET_SEASON: ${{ inputs.season || '2026' }}
          F1_FASTF1_CACHE_DIR: /tmp/fastf1_cache
          F1_DATA_RAW_DIR: data/raw
          F1_DATA_PROCESSED_DIR: data/processed
          F1_DATA_OUTPUTS_DIR: data/outputs
          F1_DATA_EXTERNAL_DIR: data/external
          F1_MODELS_DIR: models/artifacts
          F1_REPORTS_DIR: reports
        run: |
          uv run python scripts/master_pipeline.py \
            --round ${{ steps.resolve.outputs.round }} \
            --auto

      - name: Compute post-race verdict
        if: steps.resolve.outputs.race_found == 'true' && steps.resolve.outputs.mode == 'post-race'
        env:
          F1_TARGET_SEASON: ${{ inputs.season || '2026' }}
        run: |
          uv run python -c "
          import json
          from pathlib import Path
          from f1_predictions.evaluation.post_race_verdict import (
              load_predictions, load_actuals, compute_verdict
          )
          round_num = int('${{ steps.resolve.outputs.round }}')
          season = int('${{ inputs.season || 2026 }}')
          predictions_path = Path('data/outputs') / f'round_{round_num:02d}_predictions.csv'
          if not predictions_path.exists():
              predictions_path = Path('data/outputs') / 'predictions.csv'
          predictions = load_predictions(predictions_path)
          actuals = load_actuals(season, round_num)
          verdict = compute_verdict(predictions, actuals, round_num, 'Grand Prix')
          verdict_path = Path('data/outputs') / f'verdict_round_{round_num:02d}.json'
          verdict_path.write_text(json.dumps(verdict.to_dict(), indent=2))
          "

      - name: Send notification
        if: steps.resolve.outputs.race_found == 'true'
        env:
          F1_GMAIL_USER: ${{ secrets.F1_GMAIL_USER }}
          F1_GMAIL_APP_PASSWORD: ${{ secrets.F1_GMAIL_APP_PASSWORD }}
          F1_RECIPIENT_EMAIL: ${{ secrets.F1_RECIPIENT_EMAIL }}
          F1_DISCORD_WEBHOOK_URL: ${{ secrets.F1_DISCORD_WEBHOOK_URL }}
          F1_TARGET_SEASON: ${{ inputs.season || '2026' }}
        run: |
          uv run python -c "
          import json, os
          from pathlib import Path
          from f1_predictions.evaluation.post_race_verdict import RaceVerdict
          from f1_predictions.utils.email_builder import build_email_html, build_subject
          from f1_predictions.utils.notifications import (
              GmailSMTPChannel, DiscordWebhookChannel,
              NotificationDispatcher, RaceBriefingPayload
          )
          from f1_predictions.utils.config import get_settings

          settings = get_settings()
          round_num = int('${{ steps.resolve.outputs.round }}')
          mode = '${{ steps.resolve.outputs.mode }}'
          event_name = '${{ steps.resolve.outputs.event }}'
          
          if mode == 'post-race':
              verdict_path = Path('data/outputs') / f'verdict_round_{round_num:02d}.json'
              data = json.loads(verdict_path.read_text())
              verdict = RaceVerdict(**data)
              report_name = f'report_round_{round_num:02d}.md'
              subj_prefix = ''
          else:
              verdict = RaceVerdict(round=round_num, gp_name=event_name, mae_lap_time_s=0, mape_pct=0, winner_correct=True, podium_accuracy_pct=0, top10_accuracy_pct=0)
              report_name = f'predicted_report_round_{round_num:02d}.md'
              subj_prefix = '🚀 PREDICTION PREVIEW: '

          report_path = Path('reports') / str(settings.target_season) / event_name.replace(' ', '_') / 'results' / report_name
          ai_narrative = report_path.read_text() if report_path.exists() else 'Simulation complete.'
          
          html = build_email_html(verdict, ai_narrative=ai_narrative)
          subject = subj_prefix + build_subject(verdict)

          channels = [GmailSMTPChannel(settings.gmail_user, settings.gmail_app_password, settings.recipient_email)]
          if settings.discord_webhook_url:
              channels.append(DiscordWebhookChannel(settings.discord_webhook_url))
          
          dispatcher = NotificationDispatcher(channels)
          dispatcher.dispatch(RaceBriefingPayload(verdict=verdict, html_body=html, subject=subject))
          "
