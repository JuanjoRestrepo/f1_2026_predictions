# =============================================================================
# CI pipeline for f1_2026_predictions
#
# Stages:   lint → type-check → test
# Triggers: push to any branch, pull_request targeting master
#
# Rationale for tool choices:
#   - uv: official fast Python package manager; resolves from uv.lock for
#         deterministic, reproducible CI installs.
#   - ruff: replaces black+flake8+isort in one fast pass; enforces all rules
#           defined in pyproject.toml [tool.ruff].
#   - mypy --strict: catches type errors before runtime; configured via
#                    [tool.mypy] in pyproject.toml.
#   - pytest --cov: enforces >=80% coverage gate on src/; fails the build
#                   if coverage drops below the threshold in pyproject.toml.
#
# Notes:
#   - FastF1 API is NOT called during CI: all tests mock network I/O.
#   - The FastF1 cache dir is a throwaway temp dir in CI (set via env var).
#   - No secrets are needed for unit tests.
# =============================================================================

name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1 — Lint (ruff check + ruff format)
  # Runs first and fastest. Blocks subsequent jobs on failure to avoid wasting
  # type-check and test minutes on unformatted code.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies (dev group)
        run: uv sync --group dev

      - name: Ruff — lint check
        run: uv run ruff check src/ tests/

      - name: Ruff — format check
        run: uv run ruff format --check src/ tests/

  # ---------------------------------------------------------------------------
  # Job 2 — Type check (mypy --strict)
  # Runs in parallel with lint once push triggers both. On PRs lint gates first.
  # ---------------------------------------------------------------------------
  type-check:
    name: Type Check (mypy --strict)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies (dev group)
        run: uv sync --group dev

      - name: Cache mypy
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: |
            mypy-${{ runner.os }}-

      - name: mypy strict type check
        run: uv run mypy src/ --strict

  # ---------------------------------------------------------------------------
  # Job 3 — Tests (pytest + coverage)
  # Runs after lint passes. Coverage gate enforced by [tool.coverage.report]
  # fail_under = 80 in pyproject.toml.
  # ---------------------------------------------------------------------------
  test:
    name: Tests (pytest + coverage)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: ".python-version"

      - name: Install dependencies (dev group)
        run: uv sync --group dev

      - name: Cache pytest
        uses: actions/cache@v4
        with:
          path: .pytest_cache
          key: pytest-${{ runner.os }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            pytest-${{ runner.os }}-

      - name: Run tests with coverage
        env:
          # Point FastF1 cache to a temp dir so tests never call the CDN
          F1_FASTF1_CACHE_DIR: /tmp/fastf1_cache_ci
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30
